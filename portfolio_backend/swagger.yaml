openapi: 3.0.0
info:
  title: Portfolio API
  version: 1.0.0
  description: Complete API documentation for portfolio backend

servers:
  - url: http://localhost:${PORT}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, viewer]

    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    Skill:
      type: object
      required: [title]
      properties:
        _id:
          type: string
        icon:
          type: string
        title:
          type: string
        category:
          type: string
          enum:
            [Frontend, Backend, Database, Devops, Tools, IT Helpdesk, Others]
        proficiency:
          type: integer
          minimum: 1
          maximum: 10

    Education:
      type: object
      required: [institutionName, courseTitle]
      properties:
        _id:
          type: string
        institutionName:
          type: string
        courseTitle:
          type: string
        description:
          type: string
        completed:
          type: boolean
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        skills:
          type: array
          items:
            type: string
        order:
          type: number

    Certification:
      type: object
      required: [institutionName, certificateName]
      properties:
        _id:
          type: string
        institutionName:
          type: string
          description: Education ID
        certificateName:
          type: string
        certificateImage:
          type: string
        certificateURL:
          type: string
        skills:
          type: array
          items:
            type: string
        issueDate:
          type: string
          format: date
        expiryDate:
          type: string
          format: date

    Experience:
      type: object
      required: [companyName, role, description, startDate]
      properties:
        _id:
          type: string
        companyName:
          type: string
        role:
          type: string
        description:
          type: string
        skills:
          type: array
          items:
            type: string
        owner:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    Project:
      type: object
      required: [projectTitle, projectDescription]
      properties:
        _id:
          type: string
        projectTitle:
          type: string
        projectImage:
          type: string
        projectDescription:
          type: string
        projectStack:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        projectGithubURL:
          type: string
        projectURL:
          type: string
        owner:
          type: string

    Service:
      type: object
      required: [serviceTitle, serviceDescription]
      properties:
        _id:
          type: string
        serviceTitle:
          type: string
        serviceImage:
          type: string
        serviceDescription:
          type: string
        tags:
          type: string

    Contact:
      type: object
      required: [firstName, lastName, email, subject, description]
      properties:
        _id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        subject:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, responded]

paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        200:
          description: User registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /certifications:
    get:
      tags: [Certification]
      summary: Get all certifications
      responses:
        200:
          description: Success

    post:
      tags: [Certification]
      security:
        - bearerAuth: []
      summary: Create certification
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Certification"
      responses:
        200:
          description: Created

  /certifications/{id}:
    put:
      tags: [Certification]
      security:
        - bearerAuth: []
      summary: Update certification
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Updated

    delete:
      tags: [Certification]
      security:
        - bearerAuth: []
      summary: Delete certification
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Deleted

  /contact:
    post:
      tags: [Contact]
      summary: Send message
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Contact"
      responses:
        200:
          description: Sent

    get:
      tags: [Contact]
      security:
        - bearerAuth: []
      summary: Get all messages
      responses:
        200:
          description: Success

  /contact/{id}:
    patch:
      tags: [Contact]
      security:
        - bearerAuth: []
      summary: Update status
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Updated

    delete:
      tags: [Contact]
      security:
        - bearerAuth: []
      summary: Delete message
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Deleted

  /education:
    get:
      tags: [Education]
      summary: Get all education
      responses:
        200:
          description: Success

    post:
      tags: [Education]
      security:
        - bearerAuth: []
      summary: Add education
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Education"
      responses:
        200:
          description: Created

  /education/{id}:
    put:
      tags: [Education]
      security:
        - bearerAuth: []
      summary: Update education
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Updated

    delete:
      tags: [Education]
      security:
        - bearerAuth: []
      summary: Delete education
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Deleted

  /experience:
    get:
      tags: [Experience]
      summary: Get all experiences
      responses:
        200:
          description: Success

    post:
      tags: [Experience]
      security:
        - bearerAuth: []
      summary: Create experience
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Experience"
      responses:
        200:
          description: Created

  /experience/{id}:
    put:
      tags: [Experience]
      security:
        - bearerAuth: []
      summary: Update experience
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Updated

    delete:
      tags: [Experience]
      security:
        - bearerAuth: []
      summary: Delete experience
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Deleted

  /projects:
    get:
      tags: [Projects]
      summary: Get all projects
      responses:
        200:
          description: Success

    post:
      tags: [Projects]
      security:
        - bearerAuth: []
      summary: Create project
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Project"
      responses:
        200:
          description: Created

  /projects/{id}:
    put:
      tags: [Projects]
      security:
        - bearerAuth: []
      summary: Update project
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Updated

    delete:
      tags: [Projects]
      security:
        - bearerAuth: []
      summary: Delete project
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Deleted

  /services:
    get:
      tags: [Services]
      summary: Get all services
      responses:
        200:
          description: Success

    post:
      tags: [Services]
      security:
        - bearerAuth: []
      summary: Create service
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Service"
      responses:
        200:
          description: Created

  /services/{id}:
    put:
      tags: [Services]
      security:
        - bearerAuth: []
      summary: Update service
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Updated

    delete:
      tags: [Services]
      security:
        - bearerAuth: []
      summary: Delete service
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Deleted

  /skills:
    get:
      tags: [Skills]
      summary: Get all skills
      responses:
        200:
          description: Success

    post:
      tags: [Skills]
      security:
        - bearerAuth: []
      summary: Create skill
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Skill"
      responses:
        200:
          description: Created

  /skills/{id}:
    put:
      tags: [Skills]
      security:
        - bearerAuth: []
      summary: Update skill
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Updated

    delete:
      tags: [Skills]
      security:
        - bearerAuth: []
      summary: Delete skill
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Deleted

  /upload:
    post:
      tags: [Uploads]
      summary: Upload an image to Cloudinary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file to upload
      responses:
        200:
          description: Image uploaded successfully
          content:
            application/json:
              example:
                success: true
                url: https://res.cloudinary.com/demo/image/upload/sample.jpg
        400:
          description: Bad request (invalid file)
          content:
            application/json:
              example:
                success: false
                message: Invalid file type
        401:
          description: Unauthorized (JWT missing or invalid)
          content:
            application/json:
              example:
                success: false
                message: Unauthorized
        500:
          description: Server error
          content:
            application/json:
              example:
                success: false
                message: Upload failed
